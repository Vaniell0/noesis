# Pilot LoRA config — open tool-call + honesty fixture, α=0 baseline.
#
# Post-2026-07-22 pivot per runtime-decisions §7 "Variant A locked":
# fine-tune signal comes from `training/fixtures/tool_call_open.jsonl`
# (open sources: Anthropic public tool-use docs, MCP schema examples,
# hand-crafted "I don't know → invoke tool" patterns). Personal Claude
# CLI corpus is retrieval-only, NOT training data. See
# `training/README.md` §Corpus policy and `training/corpus/RECLASSIFIED.md`.
#
# Values mirror the design decisions in `plans/cosmic-purring-cocke.md`
# §Design. `training/lora_train.py` exposes StateCapture + train_step
# primitives; full Lightning-driven training requires the documented
# vendor patch (`light_rwkv.py::training_step`, infctx branch) which
# is not yet applied.

model:
  # Cached checkpoint at ~/.libs/models/rwkv7/rwkv7-g1d-0.4b — smallest
  # pilot target. Middle target is 1.5B (Design §1).
  checkpoint: "~/.libs/models/rwkv7/rwkv7-g1d-0.4b/rwkv7-g1d-0.4b.pth"
  ctx_len: 4096
  dtype: "bf16"

lora:
  rank: 32
  alpha: 64
  target_modules: ["receptance", "key", "value"]  # RWKV-PEFT default surface
  dropout: 0.0

optimizer:
  name: "adamw"
  lr: 3.0e-5
  weight_decay: 0.01
  warmup_steps: 200
  grad_accum_steps: 8
  batch_size: 1

training:
  epochs: 3
  eval_every_steps: 1000
  ckpt_every_steps: 500
  early_stop_val_no_drop_by_steps: 500  # abort if no improvement by 500 steps

corpus:
  # Post-pivot: fixture-only for pilot smoke. `tokenized_pt` points to
  # the output of `training/tokenize_fixture.py`. Bigger open-corpus
  # tokenised dir is future work under `training/tokenised/`.
  tokenized_pt: "training/fixtures/tool_call_open.pt"
  val_fraction: 0.0        # fixture is too small to split; pilot smoke only
  a02_eval_path: "experiments/A0_eval/tasks.jsonl"

# State-reg hook. A0.5 PASS on all three sub-tests (verdict.md) locked
# the branch: trajectory_reg with A0.5-derived layer weights
# (see state_reg.py::_A05_ZERO_LAYER_KL). alpha=0 leaves the hookup wired
# but makes total loss == CE (state_reg branch short-circuits early).
#
# Pilot bring-up plan:
#   1. mode=off, alpha=0.0                   — baseline CE loss curve, no
#      state capture, no hook overhead.
#   2. mode=trajectory_reg, alpha=0.0        — sanity: state hooks fire, CE
#      curve identical to step 1 (proves capture is non-invasive).
#   3. mode=trajectory_reg, alpha=1e-3..1e-1 — sweep to find the value
#      that lifts bit_book_05 (variable-length prefix code) without
#      regressing extraction. Start low; state_reg motion+curvature terms
#      are unnormalised and can dominate CE at alpha ~= 1.
state_reg:
  mode: "off"
  alpha: 0.0
  lambda_delta: 1.0
  lambda_curvature: 1.0
  # A0.5-sampled layers with above-floor KL. For a 24-layer target the
  # default sample set is {12, 16, 20}; empty here so state_reg.py's
  # default_layer_weights kicks in unmodified.
  work_layers: []

logging:
  run_dir: "training/runs"
  run_name: "pilot_g1d_a0"
